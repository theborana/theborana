name: Generate 3D Contribution Calendar

on:
  schedule:
    # Runs every day at 18:00 UTC
    - cron: "0 18 * * *"
  workflow_dispatch: # allow manual runs
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate 3D contribution SVGs
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          USERNAME: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit & push generated SVGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A .
          git commit -m "chore: update 3d contribution calendar" || echo "No changes to commit"
          git push origin HEAD:main || echo "Nothing to push"
